<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H24ONLINE - Live Tambola</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=87p986X3"></script>

    <style>
        :root {
            --accent-yellow: #ffff00;
            --accent-red: #ff0000;
            --accent-pink: #c2185b;
            --accent-orange: #ff6a00;
            --accent-green: #00ff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body {
            background: url('http://starttambola.com/publish/themeStore/db/100008/img/bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        /* ===== BANNER ===== */
        .header-banner { width: 100%; position: relative; }
        .banner-img { width: 100%; max-height: 200px; object-fit: cover; }
        .banner-text-overlay {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 26px; font-weight: 900; letter-spacing: 1.5px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8); text-transform: uppercase;
        }

        /* ===== LIVE STREAM AREA ===== */
        .live-stream-container {
            margin: 0 10px 10px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: #000;
            border: 2px solid rgba(255,0,0,0.5);
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        .live-stream-container.offline {
            border-color: rgba(255,255,255,0.1);
            box-shadow: none;
        }

        #liveVideo {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            background: #000;
            object-fit: cover;
        }

        /* LIVE badge overlay */
        .live-badge-overlay {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--accent-red);
            color: #fff;
            font-size: 11px; font-weight: 900;
            padding: 3px 10px; border-radius: 4px;
            letter-spacing: 2px;
            display: none;
            animation: blink 1.2s infinite;
        }
        .live-badge-overlay.show { display: block; }

        /* Unmute button */
        #unmuteBar {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        #unmuteBar button {
            background: rgba(255,0,0,0.9);
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
            white-space: nowrap;
        }

        /* Offline / waiting overlay */
        .stream-offline-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px;
        }
        .stream-offline-overlay.hidden { display: none; }

        .stream-offline-icon {
            width: 48px; height: 48px; opacity: 0.4;
        }
        .stream-offline-txt {
            font-size: 13px; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; font-weight: 700;
        }
        .stream-connecting-txt {
            font-size: 12px; color: var(--accent-orange);
            letter-spacing: 1px; font-weight: 700;
            display: none;
            animation: blink 1s infinite;
        }

        /* Viewer count */
        .stream-meta-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,0,0,0.2);
        }
        .stream-meta-left { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
        .stream-meta-right { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

        /* JOIN LIVE button */
        .join-live-btn {
            background: linear-gradient(135deg, #b71c1c, #c62828);
            color: #fff; border: none;
            padding: 10px 30px; border-radius: 6px;
            font-size: 14px; font-weight: 900;
            cursor: pointer; letter-spacing: 1px;
            margin-top: 8px;
            animation: blink 1.5s infinite;
        }
        .join-live-btn:active { opacity: 0.8; }

        @keyframes blink { 50% { opacity: 0.6; } }

        /* ===== TIMER ===== */
        .timer-section { padding: 14px 10px 6px; }
        .timer-labels { display: flex; justify-content: center; gap: 10px; margin-bottom: 4px; }
        .timer-labels span { min-width: 80px; font-size: 12px; font-weight: 700; color: #ccc; letter-spacing: 1px; }
        .timer-boxes { display: flex; justify-content: center; gap: 10px; }
        .t-box {
            background: #fff; color: #000; font-weight: 900; font-size: 24px;
            padding: 10px 6px; border: 2px solid var(--accent-yellow);
            border-radius: 6px; min-width: 80px;
        }

        /* ===== GAME STATUS ===== */
        #gameStatusBar {
            font-size: 26px; font-weight: 900;
            margin: 10px 0 6px;
            text-shadow: 0 0 12px currentColor;
            animation: blink 1.4s infinite;
        }
        #gameStatusBar.live   { color: var(--accent-red); }
        #gameStatusBar.over   { color: var(--accent-yellow); animation: none; }
        #gameStatusBar.wait   { color: var(--accent-orange); }
        #gameStatusBar.winner { color: var(--accent-yellow); }

        /* ===== WINNER BANNER ===== */
        #winnerBanner {
            display: none; color: var(--accent-yellow);
            font-size: 20px; font-weight: 900; margin: 4px 0;
            text-shadow: 0 0 10px rgba(255,255,0,0.6);
            animation: blink 1s infinite;
        }
        #winnerBanner.show { display: block; }

        /* ===== BOARD ===== */
        .board-container { padding: 10px; max-width: 460px; margin: 0 auto; position: relative; }
        .board-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
        .cell {
            background: white; color: black; aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900; border: 1px solid #4a0e4e;
            transition: background 0.35s ease;
        }
        .cell.called { background: transparent !important; color: #fff !important; border: 1px solid var(--accent-pink); }
        .cell.latest { background: var(--accent-yellow) !important; color: #000 !important; box-shadow: 0 0 15px var(--accent-yellow); z-index: 1; }

        /* ===== BUBBLE ===== */
        .smooth-bubble {
            position: fixed; width: 48px; height: 48px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--accent-yellow), #ffa500);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 900; font-size: 18px; z-index: 9999;
            box-shadow: 0 5px 18px rgba(255,220,0,0.6); pointer-events: none;
            animation: bubbleRise 3.5s ease-out forwards;
        }
        @keyframes bubbleRise {
            0%   { transform: translateY(0) scale(1); opacity: 0; }
            15%  { opacity: 1; transform: translateY(-30px) scale(1.35); }
            100% { transform: translateY(-340px) scale(0.8); opacity: 0; }
        }

        /* ===== RECENT BALLS ===== */
        .recent-balls {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            padding: 8px 10px;
            max-width: 460px;
            margin: 0 auto;
        }
        .ball {
            width: 100%; aspect-ratio: 1; background: #e9a1c0; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; box-shadow: 2px 2px 4px rgba(0,0,0,0.35);
            animation: ballEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ballEntrance {
            0%   { transform: scale(0) rotate(-180deg) translateY(40px); opacity: 0; }
            100% { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; }
        }

        /* ===== DIVIDEND LIST ===== */
        .div-title { font-size: 22px; font-weight: 900; color: var(--accent-yellow); margin: 16px 0 4px; }
        .div-item { background: rgba(0,10,50,0.7); padding: 13px; border-bottom: 1px solid #333; margin: 0 10px; }
        .view-btn { background: var(--accent-pink); color: #fff; border: none; padding: 9px 50px; border-radius: 5px; font-weight: 700; cursor: pointer; margin-top: 6px; }

        /* ===== FLOATING BUTTON ===== */
        .floating-sheet-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #ff8c00, #e65100);
            border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #fff; z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-sheet-btn:hover { transform: scale(1.1); }
        .floating-sheet-btn svg { width: 24px; height: 24px; margin-bottom: 1px; }
        .floating-sheet-btn span { color: #fff; font-size: 9px; font-weight: 900; text-transform: uppercase; }

        /* ===== MODAL ===== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10001; align-items: center; justify-content: center; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal { background: #001457; border: 2px solid #0000ff; width: 100%; max-width: 380px; padding: 20px; position: relative; border-radius: 10px; }

        /* ===== HANDRISE ===== */
        .handrise-section {
            margin: 0 10px 80px;
            background: rgba(0,10,50,0.75);
            border: 1px solid rgba(255,255,0,0.2);
            border-radius: 10px;
            padding: 10px 14px;
        }
        .handrise-label {
            font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.4);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
        }
        .handrise-btns {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
        }
        .hr-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            font-size: 22px;
            padding: 8px 14px;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            color: #fff;
        }
        .hr-btn:active { transform: scale(0.88); background: rgba(255,255,0,0.15); }
        .hr-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .hr-name-input {
            width: 100%; padding: 8px 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; color: #fff;
            font-size: 13px; font-family: 'Roboto', sans-serif; outline: none;
        }
        .hr-name-input::placeholder { color: rgba(255,255,255,0.3); }
        .hr-name-input:focus { border-color: rgba(255,255,0,0.5); }
        .hr-sent-msg {
            text-align: center; font-size: 12px; color: var(--accent-green);
            font-weight: 700; margin-top: 6px; display: none;
        }



        /* Stream quality indicator */
        .quality-dot {
            display: inline-block; width: 8px; height: 8px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            margin-right: 4px; vertical-align: middle;
        }
        .quality-dot.good { background: var(--accent-green); }
        .quality-dot.ok   { background: var(--accent-orange); }
        .quality-dot.bad  { background: var(--accent-red); }
    </style>
</head>
<body>



    <!-- ===== WIN TOAST ===== -->
    <div id="winToast" style="position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-30px);background:linear-gradient(135deg,#064420,#0a6632);border:2px solid #00ff00;border-radius:18px;padding:18px 28px;z-index:99000;opacity:0;pointer-events:none;transition:all 0.45s cubic-bezier(0.175,0.885,0.32,1.275);text-align:center;min-width:250px;box-shadow:0 0 40px rgba(0,255,0,0.35);">
        <div style="font-size:34px;margin-bottom:6px;">🏆</div>
        <div style="font-size:16px;font-weight:900;color:#00ff00;letter-spacing:1px;">অভিনন্দন! আপনি জিতেছেন!</div>
        <div id="winToastType" style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px;letter-spacing:1px;"></div>

    <!-- ===== LIVE STREAM ===== -->

        <!-- LIVE badge -->

            <button onclick="unmuteVideo()">🔊 সাউন্ড চালু করুন</button>

        <div class="stream-offline-overlay" id="offlineOverlay">

                <line x1="3" y1="3" x2="21" y2="21" stroke-width="1.5"/>

    <!-- HANDRISE -->
    <div class="handrise-section" id="handriseSection" style="display:none;">
        <div class="handrise-label">✋ হ্যান্ড রাইস করুন</div>
        <input type="text" id="hrNameInput" class="hr-name-input" placeholder="আপনার নাম লিখুন..." maxlength="30" autocomplete="off">

            <button class="hr-btn" onclick="sendHandrise('🙌')">🙌</button>

        <div class="hr-sent-msg" id="hrRoundNotice" style="display:none;color:var(--accent-orange);">⏳ এই রাউন্ডে ইতিমধ্যে পাঠিয়েছেন</div>

    <!-- TIMER -->
    <div id="gameSection">

<script type="module">
// ══════════════════════════════════════════════════════
// FIREBASE 1 — GAME DATABASE (Realtime DB, compat style)
// ══════════════════════════════════════════════════════
import { initializeApp as initGame } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ══════════════════════════════════════════════════════
// FIREBASE 2 — H24-ONLINE (Auth + Firestore wallet)
// ══════════════════════════════════════════════════════
import { initializeApp as initH24 }      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc, increment, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Game DB config ──
const GAME_CONFIG = {
    apiKey: "AIzaSyD3WQJHDvRgWApZaNXW4Uyk5xrDj3LEQBQ",
    authDomain: "test-only-12cb4.firebaseapp.com",
    databaseURL: "https://test-only-12cb4-default-rtdb.firebaseio.com",
    projectId: "test-only-12cb4",
    storageBucket: "test-only-12cb4.firebasestorage.app",
    messagingSenderId: "117153640941",
    appId: "1:117153640941:web:19be2776f788e3bdb5b7e4"
};

// ── H24 Wallet/Auth config ──
const H24_CONFIG = {
    apiKey: "AIzaSyCZWRcCP0hXTkfQoRhqxczgdD6cw5kp39c",
    authDomain: "h24-online.firebaseapp.com",
    projectId: "h24-online",
    storageBucket: "h24-online.firebasestorage.app",
    messagingSenderId: "808524719613",
    appId: "1:808524719613:web:7f1abe9e70a346c3376594"
};

const gameApp  = initGame(GAME_CONFIG, 'game-db');
const h24App   = initH24(H24_CONFIG,   'h24-wallet');
const database = getDatabase(gameApp);
const h24Auth  = getAuth(h24App);
const h24db    = getFirestore(h24App);

// ══════════════════════════════════════════════════════
// AUTH — শুধু prize credit এর জন্য, কোনো redirect নেই
// ══════════════════════════════════════════════════════
let currentUser   = null;
let paidPrizeKeys = new Set();

// Background এ user detect করো — redirect নেই
onAuthStateChanged(h24Auth, (user) => {
    if (!user) return; // login নেই — game দেখাবে, prize পাবে না
    currentUser = user;
    localStorage.setItem('userId', user.uid);
    try {
        const stored = localStorage.getItem(`paidKeys_${user.uid}`);
        if (stored) paidPrizeKeys = new Set(JSON.parse(stored));
    } catch(e) {}
    startWinnerListener();
});

// ══════════════════════════════════════════════════════
// PRIZE — winner detect + wallet credit
// ══════════════════════════════════════════════════════
const PRIZE_LABELS = {
    fullhouse:   'Full House',
    corner:      'Corner',
    earlyfive:   'Early Five',
    quick7:      'Quick 7',
    topline:     'Top Line',
    middleline:  'Middle Line',
    bottomline:  'Bottom Line'
};

let winnerListenerActive = false;

function startWinnerListener() {
    if (winnerListenerActive) return;
    winnerListenerActive = true;

    onValue(ref(database, 'game'), async (snap) => {
        const d = snap.val();
        if (!d || !currentUser) return;

        const roundNum = d.roundNum || 0;
        const winners  = d.winners  || {};
        const prizes   = d.prizes   || {}; // Admin দেওয়া prize amounts

        for (const [type, winData] of Object.entries(winners)) {
            if (!winData || !winData.uid) continue;

            // এই user এর জন্য winner কিনা check করো
            if (winData.uid !== currentUser.uid) continue;

            // prize amount — Firebase prizes/{type} থেকে, না থাকলে 0
            const amount = prizes[type] || winData.prizeAmount || 0;
            if (amount <= 0) continue;

            // Unique key — রাউন্ড + type + uid মিলিয়ে
            const prizeKey = `${roundNum}_${type}_${currentUser.uid}`;
            if (paidPrizeKeys.has(prizeKey)) continue; // ইতিমধ্যে দেওয়া হয়েছে

            // Game DB তে paid flag চেক করো
            try {
                const paidSnap = await get(ref(database, `game/prizePaid/${prizeKey.replace(/\./g,'_')}`));
                if (paidSnap.exists() && paidSnap.val() === true) {
                    paidPrizeKeys.add(prizeKey);
                    savePaidKeys();
                    continue;
                }
            } catch(e) {}

            // ✅ Prize দাও
            await creditPrize(prizeKey, type, amount, roundNum);
        }
    });
}

async function creditPrize(prizeKey, type, amount, roundNum) {
    if (!currentUser) return;
    const safeKey = prizeKey.replace(/\./g, '_');

    try {
        // 1️⃣ Game DB তে paid flag সেট করো (race condition থেকে বাঁচাতে)
        await set(ref(database, `game/prizePaid/${safeKey}`), true);

        // 2️⃣ H24 Firestore wallet এ balance যোগ করো
        // document না থাকলেও কাজ করবে (নতুন account)
        await setDoc(doc(h24db, 'users', currentUser.uid), {
            balance: increment(amount)
        }, { merge: true });

        // 3️⃣ Transaction history তে record করো
        await addDoc(collection(h24db, 'transactions'), {
            uid:       currentUser.uid,
            type:      'prize',
            amount:    amount,
            label:     `Tambola Prize — ${PRIZE_LABELS[type] || type} (Round #${roundNum})`,
            roundNum:  roundNum,
            prizeType: type,
            createdAt: serverTimestamp()
        });

        // 4️⃣ Local set এ রাখো
        paidPrizeKeys.add(prizeKey);
        savePaidKeys();

        // 5️⃣ Win toast দেখাও
        showWinToast(PRIZE_LABELS[type] || type, amount);

    } catch(e) {
        console.error('Prize credit error:', e);
    }
}

function savePaidKeys() {
    if (!currentUser) return;
    try {
        localStorage.setItem(`paidKeys_${currentUser.uid}`, JSON.stringify([...paidPrizeKeys]));
    } catch(e) {}
}

function showWinToast(label, amount) {
    const toast = document.getElementById('winToast');
    document.getElementById('winToastType').textContent  = label.toUpperCase();
    document.getElementById('winToastAmount').textContent = `+৳${amount}`;
    toast.classList.add('show');
    // 6 সেকেন্ড পরে hide
    setTimeout(() => toast.classList.remove('show'), 6000);
    // Voice announcement
    try {
        if (typeof responsiveVoice !== 'undefined') {
            responsiveVoice.speak(`Congratulations! You won ${amount} taka for ${label}`, 'UK English Female');
        }
    } catch(e) {}
}

// ===== CLEANUP PEER =====
function cleanupPeer() {
    if (offerUnsubscribe)  { offerUnsubscribe();  offerUnsubscribe  = null; }
    if (iceUnsubscribe)    { iceUnsubscribe();    iceUnsubscribe    = null; }
    if (peerConn)          { peerConn.close();    peerConn          = null; }
    iceQueue = [];
    isJoined = false;
}

// ===== JOIN LIVE =====
async function joinLive() {
    if (isJoined || !hostIsLive) return;
    cleanupPeer();

    document.getElementById('offlineTxt').style.display   = 'none';
    document.getElementById('joinLiveBtn').style.display  = 'none';
    document.getElementById('connectingTxt').style.display = 'block';
    document.getElementById('unmuteBar').style.display    = 'none';

    peerConn = new RTCPeerConnection(ICE_SERVERS);

    peerConn.ontrack = e => {
        const video = document.getElementById('liveVideo');
        if (video.srcObject !== e.streams[0]) {
            video.srcObject = e.streams[0];
            video.muted = true;
            video.play().then(() => {
                document.getElementById('unmuteBar').style.display = 'block';
            }).catch(err => console.warn('Autoplay blocked:', err));
        }
        document.getElementById('offlineOverlay').classList.add('hidden');
        document.getElementById('liveBadge').classList.add('show');
        document.getElementById('connectingTxt').style.display = 'none';
        document.getElementById('streamQuality').textContent   = 'HD Live';
        document.getElementById('qualityDot').className        = 'quality-dot good';
    };

    peerConn.onicecandidate = async e => {
        if (e.candidate) {
            try {
                await update(ref(database, `webrtc/viewers/${myViewerId}`), {
                    type: 'ice', candidate: e.candidate.toJSON()
                });
            } catch(err) { console.warn('ICE send error:', err); }
        }
    };

    peerConn.onconnectionstatechange = () => {
        if (!peerConn) return;
        const state = peerConn.connectionState;
        if (state === 'connected') {
            isJoined = true;
            document.getElementById('connectingTxt').style.display = 'none';
        } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
            isJoined = false;
            document.getElementById('unmuteBar').style.display = 'none';
            setStreamOffline('সংযোগ বিচ্ছিন্ন — পুনরায় চেষ্টা হচ্ছে...');
            if (hostIsLive) setTimeout(() => joinLive(), 3000);
        }
    };

    try {
        await set(ref(database, `webrtc/viewers/${myViewerId}`), {
            type: 'join', joinedAt: Date.now()
        });
    } catch(err) {
        console.error('Register error:', err);
        return;
    }

    // ===== OFFER LISTENER =====
    offerUnsubscribe = onValue(ref(database, `webrtc/offers/${myViewerId}`), async snap => {
        const data = snap.val();
        if (!data || data.type !== 'offer' || !peerConn) return;
        if (peerConn.signalingState !== 'stable') return;
        try {
            await peerConn.setRemoteDescription(new RTCSessionDescription(data.sdp));
            for (const ice of iceQueue) {
                try { await peerConn.addIceCandidate(new RTCIceCandidate(ice)); } catch(e) {}
            }
            iceQueue = [];
            const answer = await peerConn.createAnswer();
            await peerConn.setLocalDescription(answer);
            await set(ref(database, `webrtc/viewers/${myViewerId}`), {
                type: 'answer', sdp: { type: answer.type, sdp: answer.sdp }
            });
        } catch(e) { console.error('Offer/Answer error:', e); }
    });

    // ===== ICE LISTENER =====
    iceUnsubscribe = onValue(ref(database, `webrtc/offers/${myViewerId}/ice`), async snap => {
        const data = snap.val();
        if (!data || !peerConn) return;
        // child values
        const candidates = Object.values(data).filter(v => v && v.candidate);
        for (const c of candidates) {
            if (peerConn.remoteDescription && peerConn.remoteDescription.type) {
                try { await peerConn.addIceCandidate(new RTCIceCandidate(c.candidate)); } catch(e) {}
            } else {
                iceQueue.push(c.candidate);
            }
        }
    });
}

// ===== FIREBASE GAME LISTENER =====
onValue(ref(database, 'game'), snap => {
    const d = snap.val();
    if (!d) return;

    const newNums      = Array.isArray(d.calledNumbers) ? d.calledNumbers : [];
    const newRoundNum  = d.roundNum       || 0;
    const newRoundTime = d.roundStartTime || 0;
    winners            = d.winners        || {};
    gameStatus         = d.status         || 'WAITING';
    numberPool         = Array.isArray(d.numberPool) ? d.numberPool : [];

    if (newRoundNum !== currentRoundNum) {
        currentRoundNum = newRoundNum;
        prevCalledNums  = [];
        lastBall        = 0;
        calledNums      = [];
        resetBoard();
    }
    roundStartTime = newRoundTime;

    const freshNums = newNums.filter(n => !prevCalledNums.includes(n));
    if (freshNums.length > 0) {
        const latest = newNums[newNums.length - 1];
        lastBall = latest;
        speak(latest);
        setTimeout(() => triggerBubble(latest), 400);
    }

    prevCalledNums = [...newNums];
    calledNums     = newNums;
    updateUI();
});

// ===== BOARD RESET =====

    document.querySelectorAll('.cell').forEach(c => c.classList.remove('called', 'latest'));

// ===== UPDATE UI =====

    document.querySelectorAll('.cell').forEach(c => c.classList.remove('called', 'latest'));
    calledNums.forEach(n => {
        const el = document.getElementById(`c-${n}`);
        if (el) el.classList.add('called');

    if (lastBall > 0) {
        const el = document.getElementById(`c-${lastBall}`);
        if (el) { el.classList.remove('called'); el.classList.add('latest'); }
    }
    const rb = document.getElementById('recentBalls');
    rb.innerHTML = '';
    [...calledNums].slice(-40).forEach(num => {
        const ball = document.createElement('div');
        ball.className  = 'ball';
        ball.textContent = num;
        rb.appendChild(ball);
    });
    renderDivs();
}

// ===== BUBBLE =====
function triggerBubble(num) {
    const targetCell = document.getElementById(`c-${num}`);
    if (!targetCell) return;
    const rect   = targetCell.getBoundingClientRect();
    const bubble = document.createElement('div');
    bubble.className  = 'smooth-bubble';
    bubble.textContent = num;
    bubble.style.top  = (rect.top  + window.scrollY + rect.height / 2 - 24) + 'px';
    bubble.style.left = (rect.left + window.scrollX + rect.width  / 2 - 24) + 'px';
    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 3500);
}

// ===== TIMER & PHASE TICK =====
function pad(n) { return String(n).padStart(2, '0'); }
function msToHMS(ms) {
    if (ms < 0) ms = 0;
    const tot = Math.floor(ms / 1000);
    return { h: Math.floor(tot / 3600), m: Math.floor((tot % 3600) / 60), s: tot % 60 };
}

function tick() {
    const now      = Date.now();
    const statusEl = document.getElementById('gameStatusBar');
    const bannerEl = document.getElementById('winnerBanner');
    bannerEl.classList.remove('show');

    // ===== নতুন লজিক =====
    // গেম LIVE → timer বন্ধ (00:00), status দেখাবে
    // গেম ENDED → পরবর্তী রাউন্ড পর্যন্ত countdown
    // WAITING → পরবর্তী রাউন্ড পর্যন্ত countdown

    if (gameStatus === 'GAME IS LIVE' || (calledNums.length > 0 && gameStatus !== 'ROUND ENDED')) {
        // গেম চলছে — timer 00:00 দেখাবে
        setBoxes(0, 0, 0);
        statusEl.className   = 'live';
        statusEl.textContent = 'GAME IS LIVE';

    } else if (gameStatus === 'ROUND ENDED') {
        // গেম শেষ → countdown শুরু
        if (roundStartTime > 0) {
            const nextRoundAt = roundStartTime + CYCLE;
            const diff = nextRoundAt - now;
            if (diff > 0) {
                const t = msToHMS(diff);
                setBoxes(t.h, t.m, t.s);
                statusEl.className   = 'winner';
                statusEl.textContent = 'ROUND ENDED';
                bannerEl.classList.add('show');
                bannerEl.textContent = `🏆 পরবর্তী রাউন্ড: ${pad(t.m)}:${pad(t.s)}`;
            } else {
                setBoxes(0, 0, 0);
                statusEl.className   = 'over';
                statusEl.textContent = 'GAME IS OVER';
            }
        } else {
            setBoxes(0, 0, 0);
            statusEl.className   = 'over';
            statusEl.textContent = 'GAME IS OVER';
        }

    } else {
        // WAITING — কোনো রাউন্ড চলছে না
        if (roundStartTime > 0) {
            const nextRoundAt = roundStartTime + CYCLE;
            const diff = nextRoundAt - now;
            if (diff > 0) {
                const t = msToHMS(diff);
                setBoxes(t.h, t.m, t.s);
                statusEl.className   = 'wait';
                statusEl.textContent = `⏳ পরবর্তী রাউন্ড ${pad(t.m)}:${pad(t.s)} পরে`;
            } else {
                setBoxes(0, 0, 0);
                statusEl.className   = 'wait';
                statusEl.textContent = 'NEXT ROUND LOADING...';
            }
        } else {
            // একেবারে প্রথম অবস্থা
            const nextCycle = (Math.floor(now / CYCLE) + 1) * CYCLE;
            const diff = nextCycle - now;
            const t = msToHMS(diff);
            setBoxes(t.h, t.m, t.s);
            statusEl.className   = 'wait';
            statusEl.textContent = 'NEXT ROUND LOADING...';
        }
    }
}

function setBoxes(h, m, s) {
    document.getElementById('h').textContent = pad(h);
    document.getElementById('m').textContent = pad(m);
    document.getElementById('s').textContent = pad(s);
}

setInterval(tick, 1000);
tick();
